<div *transloco="let t" class="h-full min-h-0 flex flex-col">
  <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 shrink-0 mb-6">{{ t('location.title') }}</h1>
  <app-data-table
    #dataTable
    [data]="locationViews()"
    [columns]="columns"
    [translations]="translations"
    [globalFilterFields]="globalFilterFields"
    stateKey="location"
    nameField="name"
    minTableWidth="50rem"
    (itemAdd)="onAdd()"
    (itemEdit)="onEdit($event)"
    (itemDelete)="onDelete($event)"
  >
    <ng-template #cell let-item let-field="field">
      @if (field === 'website' && item[field]) {
        <a [href]="item[field]" target="_blank" rel="noopener" class="text-primary hover:underline">{{ item[field] }}</a>
      } @else {
        {{ item[field] }}
      }
    </ng-template>
  </app-data-table>

  <app-location-dialog
    [visible]="dialogVisible()"
    [location]="editingLocation()"
    (locationSaved)="onSaveLocation($event)"
    (dialogClosed)="dialogVisible.set(false)"
  />
</div>
