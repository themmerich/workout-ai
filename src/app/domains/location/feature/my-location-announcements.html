<div *transloco="let t" class="flex flex-col gap-6 h-full min-h-0 p-4">
  <div class="flex items-center justify-between shrink-0">
    <h1 class="text-2xl font-semibold text-surface-800 dark:text-surface-100 m-0">
      {{ t('announcement.title') }}
    </h1>
    <p-button
      [label]="t('announcement.add')"
      icon="pi pi-plus"
      (onClick)="onAdd()"
    />
  </div>

  <div class="flex flex-col gap-3 flex-1 min-h-0 overflow-y-auto">
    @for (item of announcements(); track item.id) {
      <div class="rounded-xl bg-white/40 dark:bg-surface-800/40 backdrop-blur-sm p-4 flex flex-col gap-2 border border-surface-200 dark:border-surface-700">
        <div class="flex items-center gap-3">
          <p-tag
            [severity]="getSeverityTag(item.severity)"
            [value]="t('announcement.severities.' + item.severity)"
          />
          <span class="font-semibold text-surface-900 dark:text-surface-0">{{ item.title }}</span>
          <span class="ml-auto text-xs text-surface-400">{{ item.createdDate }}</span>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="secondary"
            size="small"
            (onClick)="onEdit(item)"
          />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            severity="danger"
            size="small"
            (onClick)="onDelete($event, item)"
          />
        </div>
        <p class="text-sm text-surface-600 dark:text-surface-300 m-0 whitespace-pre-line">{{ item.message }}</p>
      </div>
    } @empty {
      <div class="text-center text-surface-400 py-8">
        {{ t('announcement.empty') }}
      </div>
    }
  </div>

  <app-announcement-dialog
    [visible]="dialogVisible()"
    [announcement]="editingAnnouncement()"
    (announcementSaved)="onSave($event)"
    (dialogClosed)="dialogVisible.set(false)"
  />

  <p-toast />
  <p-confirmdialog />
</div>
