@if (logo()?.imageUrl) {
  <img
    [src]="logo()!.imageUrl!"
    [alt]="name()"
    class="rounded-lg object-cover"
    [style.width.px]="size()"
    [style.height.px]="size()"
  />
} @else {
  <div
    class="rounded-lg flex items-center justify-center font-bold text-white select-none"
    [style.width.px]="size()"
    [style.height.px]="size()"
    [style.background-color]="logo()?.color ?? '#6366f1'"
    [style.font-size.px]="size() * 0.4"
  >
    {{ initials() }}
  </div>
}
