<div *transloco="let t" class="h-full min-h-0 flex flex-col">
  <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 shrink-0 mb-6">{{ t('user.title') }}</h1>
  <app-data-table
    #dataTable
    [data]="userService.users()"
    [columns]="columns"
    [translations]="translations"
    [globalFilterFields]="globalFilterFields"
    stateKey="user"
    nameField="displayName"
    (itemAdd)="onAdd()"
    (itemEdit)="onEdit($event)"
    (itemDelete)="onDelete($event)"
  >
    <ng-template #cell let-item let-field="field">
      @if (field === 'role') {
        <p-tag [value]="getRoleLabel(item[field])" [severity]="getRoleSeverity(item[field])" />
      } @else {
        {{ item[field] }}
      }
    </ng-template>
  </app-data-table>

  <app-user-dialog
    [visible]="dialogVisible()"
    [user]="editingUser()"
    (userSaved)="onSaveUser($event)"
    (dialogClosed)="dialogVisible.set(false)"
  />
</div>
