<div *transloco="let t" class="h-full min-h-0 flex flex-col">
  <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 shrink-0 mb-6">{{ t('exerciseCombo.title') }}</h1>
  <app-data-table
    #dataTable
    [data]="comboService.exerciseCombos()"
    [columns]="columns()"
    [translations]="translations"
    [globalFilterFields]="globalFilterFields"
    stateKey="exercise-combo"
    nameField="name"
    (itemAdd)="onAdd()"
    (itemEdit)="onEdit($event)"
    (itemDelete)="onDelete($event)"
  >
    <ng-template #cell let-item let-field="field">
      @if (field === 'type') {
        <p-tag [value]="t('exerciseCombo.types.' + item[field])" severity="warn" />
      } @else if (field === 'exercises') {
        <span>{{ getExerciseSummary(item) }}</span>
      } @else {
        {{ item[field] }}
      }
    </ng-template>
  </app-data-table>

  <app-exercise-combo-dialog
    [visible]="dialogVisible()"
    [combo]="editingCombo()"
    (comboSaved)="onSaveCombo($event)"
    (dialogClosed)="dialogVisible.set(false)"
  />
</div>
