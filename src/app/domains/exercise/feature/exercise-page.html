<div *transloco="let t" class="h-full min-h-0 flex flex-col">
  <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0 shrink-0 mb-6">{{ t('exercise.title') }}</h1>
  <app-data-table
    #dataTable
    [data]="exerciseService.exercises()"
    [columns]="columns()"
    [translations]="translations"
    [globalFilterFields]="globalFilterFields"
    stateKey="exercise"
    nameField="name"
    (itemAdd)="onAdd()"
    (itemEdit)="onEdit($event)"
    (itemDelete)="onDelete($event)"
  >
    <ng-template #cell let-item let-field="field">
      @if (field === 'muscleGroups') {
        <div class="flex flex-wrap gap-1">
          @for (muscle of item[field]; track muscle) {
            <p-tag [value]="t('exercise.muscles.' + muscle)" severity="info" />
          }
        </div>
      } @else {
        {{ item[field] }}
      }
    </ng-template>
  </app-data-table>

  <app-exercise-dialog
    [visible]="dialogVisible()"
    [exercise]="editingExercise()"
    (exerciseSaved)="onSaveExercise($event)"
    (dialogClosed)="dialogVisible.set(false)"
  />
</div>
