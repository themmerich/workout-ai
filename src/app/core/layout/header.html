<div
  *transloco="let t"
  class="flex justify-between items-center py-4 px-8 border-b border-surface-200 dark:border-white/10 bg-surface-50 dark:bg-white/20"
>
  <button
    type="button"
    class="cursor-pointer flex items-center justify-center lg:hidden text-surface-700 dark:text-surface-300 bg-transparent border-none"
    (click)="toggleSidebar.emit()"
    [attr.aria-label]="'Toggle menu'"
  >
    <i class="pi pi-bars text-xl leading-none"></i>
  </button>
  <div class="hidden lg:block"></div>
  <div class="flex items-center gap-2">
    @if (pendingInvitations().length > 0) {
      <button
        type="button"
        class="relative cursor-pointer flex items-center justify-center w-10 h-10 rounded-lg bg-transparent border-none text-surface-700 dark:text-white/70 hover:text-surface-900 dark:hover:text-surface-0 transition-colors"
        (click)="notificationPanel.toggle($event)"
        [attr.aria-label]="t('dashboard.invitations.title')"
      >
        <i class="pi pi-bell text-lg"></i>
        <span class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">{{ pendingInvitations().length }}</span>
      </button>
      <p-popover #notificationPanel>
        <div class="w-80">
          <div class="flex items-center gap-2 mb-3 px-1">
            <span class="text-sm font-bold text-surface-900 dark:text-surface-0">{{ t('dashboard.invitations.title') }}</span>
          </div>
          <div class="flex flex-col gap-2">
            @for (item of pendingInvitations(); track item.invitation.id) {
              <div class="flex items-center justify-between p-2 rounded-lg bg-surface-50 dark:bg-surface-800">
                <div class="flex items-center gap-3">
                  <app-location-logo [logo]="item.group.logo" [name]="item.group.name" [size]="32" />
                  <div>
                    <div class="text-sm font-medium text-surface-900 dark:text-surface-0">{{ item.group.name }}</div>
                    <div class="text-xs text-surface-500 dark:text-surface-400">{{ t('dashboard.invitations.invitedBy', { name: item.inviterName }) }}</div>
                  </div>
                </div>
                <div class="flex gap-1">
                  <p-button
                    icon="pi pi-check"
                    severity="success"
                    size="small"
                    [rounded]="true"
                    [text]="true"
                    (onClick)="onAcceptInvitation(item.group.id, item.invitation.id)"
                    [ariaLabel]="t('dashboard.invitations.accept')"
                  />
                  <p-button
                    icon="pi pi-times"
                    severity="danger"
                    size="small"
                    [rounded]="true"
                    [text]="true"
                    (onClick)="onRejectInvitation(item.group.id, item.invitation.id)"
                    [ariaLabel]="t('dashboard.invitations.reject')"
                  />
                </div>
              </div>
            }
          </div>
        </div>
      </p-popover>
    }
    <button
      type="button"
      class="cursor-pointer flex items-center justify-center w-10 h-10 rounded-lg bg-transparent border-none text-surface-700 dark:text-white/70 hover:text-surface-900 dark:hover:text-surface-0 transition-colors"
      (click)="toggleLanguage()"
      [attr.aria-label]="t('header.language')"
    >
      <span class="text-sm font-bold">{{ langLabel() }}</span>
    </button>
    <button
      type="button"
      class="cursor-pointer flex items-center justify-center w-10 h-10 rounded-lg bg-transparent border-none text-surface-700 dark:text-white/70 hover:text-surface-900 dark:hover:text-surface-0 transition-colors"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'dark' ? t('header.lightMode') : t('header.darkMode')"
    >
      <i [class]="themeService.theme() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'" class="text-lg"></i>
    </button>
  </div>
</div>
<p-toast />
