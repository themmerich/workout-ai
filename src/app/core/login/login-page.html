<div
  *transloco="let t"
  class="min-h-screen flex items-center justify-center bg-linear-to-br from-blue-100 from-40% via-pink-200 via-80% to-indigo-200 dark:from-surface-900 dark:to-surface-500"
>
  <div class="w-full max-w-md p-8 rounded-2xl bg-white/70 dark:bg-surface-800/80 backdrop-blur-lg border border-surface-200 dark:border-surface-600 shadow-lg">
    <div class="flex flex-col items-center gap-2 mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" class="w-12 h-12">
        <circle cx="12" cy="12" r="12" class="fill-surface-900 dark:fill-surface-0" />
        <path d="M5.5 10.5h1.5v3H5.5a1 1 0 0 1-1-1v-1a1 1 0 0 1 1-1Zm13 0h-1.5v3h1.5a1 1 0 0 0 1-1v-1a1 1 0 0 0-1-1ZM7 9.5a1 1 0 0 1 1-1h1v7H8a1 1 0 0 1-1-1v-5Zm8 0v5a1 1 0 0 0 1 1h1v-7h-1a1 1 0 0 0-1 1ZM9 11h6v2H9v-2Z" class="fill-white dark:fill-surface-900" />
      </svg>
      <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0">{{ t('app.title') }}</h1>
      <p class="text-surface-500 dark:text-surface-400">{{ t('login.subtitle') }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onLogin()" class="flex flex-col gap-5">
      <div>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="login-username"
            formControlName="username"
            class="w-full"
          />
          <label for="login-username">{{ t('login.username') }}</label>
        </p-floatlabel>
      </div>

      <div>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="login-password"
            formControlName="password"
            type="password"
            class="w-full"
          />
          <label for="login-password">{{ t('login.password') }}</label>
        </p-floatlabel>
      </div>

      @if (errorKey()) {
        <p-message severity="error" [text]="t(errorKey()!)"></p-message>
      }

      <p-button
        [label]="t('login.submit')"
        type="submit"
        styleClass="w-full"
        [disabled]="form.invalid"
      />
    </form>
  </div>
</div>
