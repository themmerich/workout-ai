<div
  *transloco="let t"
  class="min-h-screen flex items-center justify-center bg-linear-to-br from-blue-100 from-40% via-pink-200 via-80% to-indigo-200 dark:from-surface-900 dark:to-surface-500"
>
  <div class="w-full max-w-md p-8 rounded-2xl bg-white/70 dark:bg-surface-800/80 backdrop-blur-lg border border-surface-200 dark:border-surface-600 shadow-lg">
    <div class="flex flex-col items-center gap-2 mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" width="43" height="43" viewBox="0 0 43 43" fill="none" class="w-12 h-12">
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M21.5 42.0498C33.098 42.0498 42.5 32.6477 42.5 21.0498C42.5 9.45183 33.098 0.0498047 21.5 0.0498047C9.902 0.0498047 0.5 9.45183 0.5 21.0498C0.5 32.6477 9.902 42.0498 21.5 42.0498ZM28.0513 9.83248C28.3702 8.69975 27.2709 8.02994 26.267 8.74516L12.2528 18.7288C11.164 19.5045 11.3353 21.0498 12.51 21.0498H16.2003V21.0212H23.3926L17.5323 23.089L14.9487 32.2671C14.6299 33.3999 15.729 34.0697 16.733 33.3544L30.7472 23.3708C31.836 22.5951 31.6646 21.0498 30.49 21.0498H24.8937L28.0513 9.83248Z"
          class="fill-surface-900 dark:fill-surface-0"
        />
      </svg>
      <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0">{{ t('app.title') }}</h1>
      <p class="text-surface-500 dark:text-surface-400">{{ t('login.subtitle') }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onLogin()" class="flex flex-col gap-5">
      <div>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="login-username"
            formControlName="username"
            class="w-full"
            (ngModelChange)="onUsernameChange($event)"
          />
          <label for="login-username">{{ t('login.username') }}</label>
        </p-floatlabel>
      </div>

      @if (!isAdminUser()) {
        <div>
          <p-floatlabel variant="on">
            <p-select
              formControlName="locationId"
              [options]="locationOptions()"
              optionLabel="label"
              optionValue="value"
              inputId="login-location"
              appendTo="body"
              [showClear]="true"
              styleClass="w-full"
              (ngModelChange)="onLocationChange($event)"
            />
            <label for="login-location">{{ t('login.location') }}</label>
          </p-floatlabel>
        </div>
      }

      <div>
        <p-floatlabel variant="on">
          <input
            pInputText
            id="login-password"
            formControlName="password"
            type="password"
            class="w-full"
          />
          <label for="login-password">{{ t('login.password') }}</label>
        </p-floatlabel>
      </div>

      @if (errorKey()) {
        <p-message severity="error" [text]="t(errorKey()!)"></p-message>
      }

      <p-button
        [label]="t('login.submit')"
        type="submit"
        styleClass="w-full"
        [disabled]="form.invalid"
      />
    </form>
  </div>
</div>
